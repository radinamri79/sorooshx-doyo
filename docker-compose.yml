version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: doyo-db
    environment:
      POSTGRES_DB: doyo
      POSTGRES_USER: doyo
      POSTGRES_PASSWORD: doyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doyo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doyo-network

  redis:
    image: redis:7-alpine
    container_name: doyo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doyo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doyo-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgresql://doyo:doyo@db:5432/doyo
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - doyo-network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doyo-celery
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgresql://doyo:doyo@db:5432/doyo
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
    networks:
      - doyo-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doyo-celery-beat
    command: celery -A config beat -l info
    environment:
      DATABASE_URL: postgresql://doyo:doyo@db:5432/doyo
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
    networks:
      - doyo-network

  service-rag:
    build:
      context: ./service-rag
      dockerfile: Dockerfile
    container_name: doyo-service-rag
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      DATABASE_URL: postgresql://doyo:doyo@db:5432/doyo
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-}
      OPENAI_MODEL: gpt-4o
      BACKEND_URL: http://backend:8000/api
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./service-rag:/app
    networks:
      - doyo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doyo-frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      NEXT_PUBLIC_RAG_URL: http://localhost:8001/rag
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - doyo-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: doyo-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
      - service-rag
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - doyo-network

volumes:
  postgres_data:

networks:
  doyo-network:
    driver: bridge
